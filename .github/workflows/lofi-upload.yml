name: 🎶 Zero Touch AI - Auto Generate & Upload

on:
  schedule:
    - cron: '0 2 * * *'   # 10:00 PM EST / 7:00 PM PST  → prime time malam
    - cron: '0 14 * * *'  # 10:00 AM EST / 7:00 AM PST  → mulai kerja/kuliah
    - cron: '0 18 * * *'  # 02:00 PM EST / 11:00 AM PST → istirahat siang
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # Proteksi kalau hang

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4   # v4, bukan v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5   # v5, bukan v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Install FFmpeg, Libsndfile & Fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1 fonts-dejavu-core

      - name: ⬆️ Upgrade pip
        run: python -m pip install --upgrade pip

      - name: 📦 Install Python Dependencies
        run: pip install -r requirements.txt

      - name: 🔑 Restore YouTube Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: 🎵 Generate Video
        run: python main.py

      - name: 🚀 Upload ke YouTube
        run: python uploader.py

      - name: 🧹 Cleanup file besar
        if: always()
        run: |
          rm -f *.wav *.mp4
          echo "✅ Done"
